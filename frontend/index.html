<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SoundScrapper</title>
    <link rel="stylesheet" href="/static/style.css?v=auth-header-20260601-1" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div>
            <h1>SoundScrapper</h1>
            <p>사운드 후보 탐색기</p>
          </div>
        </div>
        <div class="header-actions">
          <div id="header-auth" class="header-auth" aria-label="Freesound 로그인"></div>
          <button
            id="help-tour-start"
            class="help-tour-start"
            type="button"
            data-tooltip="화면을 단계별로 이동하면서 주요 기능을 설명합니다."
          >사용법 설명</button>
        </div>
      </header>

      <section class="workspace-layout">
        <div class="workspace-main">
          <section class="toolbar" aria-label="사운드 검색 조건">
            <form id="search-form" class="search-form">
              <label class="prompt-field" data-tooltip="찾고 싶은 사운드를 자연어로 입력합니다. 예: 짧고 묵직한 암흑 마법 폭발음">
                <span>검색 프롬프트</span>
                <input
                  id="prompt"
                  name="prompt"
                  type="search"
                  placeholder="짧고 묵직한 암흑 마법 폭발음"
                  autocomplete="off"
                  required
                />
              </label>
              <div class="search-memory">
                <button
                  id="favorite-search"
                  type="button"
                  data-tooltip="현재 입력한 검색어를 즐겨찾기에 저장하거나 해제합니다."
                >현재 검색어 즐겨찾기</button>
                <div class="memory-row">
                  <span>최근</span>
                  <div id="recent-searches" class="memory-list"></div>
                </div>
                <div class="memory-row">
                  <span>즐겨찾기</span>
                  <div id="favorite-searches" class="memory-list"></div>
                </div>
              </div>

              <div class="filters">
                <label data-tooltip="상업 사용 우선, CC0만, 전체 라이선스 중 검색 범위를 고릅니다.">
                  <span>라이선스</span>
                  <select id="license" name="license">
                    <option value="commercial" selected>상업 사용 우선</option>
                    <option value="cc0">CC0만</option>
                    <option value="any">전체</option>
                  </select>
                </label>

                <label data-tooltip="Freesound, Jamendo, Openverse 중 검색할 출처를 고릅니다.">
                  <span>출처</span>
                  <select id="source-filter" name="source-filter">
                    <option value="all" selected>전체</option>
                    <option value="freesound">Freesound</option>
                    <option value="jamendo">Jamendo</option>
                    <option value="openverse">Openverse</option>
                  </select>
                </label>

                <label data-tooltip="너무 짧은 소리를 제외할 최소 길이입니다.">
                  <span>최소 길이</span>
                  <input
                    id="min-duration"
                    name="min-duration"
                    type="number"
                    min="0"
                    step="0.1"
                    value="0.1"
                  />
                </label>

                <label data-tooltip="너무 긴 소리를 제외할 최대 길이입니다.">
                  <span>최대 길이</span>
                  <input
                    id="max-duration"
                    name="max-duration"
                    type="number"
                    min="0.1"
                    step="0.1"
                    value="3.0"
                  />
                </label>

                <label data-tooltip="한 번에 가져올 후보 개수입니다.">
                  <span>후보 수</span>
                  <input
                    id="page-size"
                    name="page-size"
                    type="number"
                    min="1"
                    max="50"
                    step="1"
                    value="20"
                  />
                </label>

                <label class="toggle-field" data-tooltip="게임에 쓰기 쉬운 짧고 깨끗한 후보를 우선합니다.">
                  <input id="game-ready" name="game-ready" type="checkbox" checked />
                  <span>게임용 우선</span>
                </label>

                <button type="submit" data-tooltip="현재 조건으로 사운드 후보를 검색합니다.">검색</button>
              </div>

              <fieldset class="condition-toggles" aria-describedby="condition-warning">
                <legend>자주 쓰는 조건</legend>
                <label class="condition-chip" data-tooltip="환경음과 배경 잡음이 적은 후보를 우선합니다.">
                  <input type="checkbox" data-search-mode="clean_source" />
                  <span>깨끗한 소스</span>
                </label>
                <label class="condition-chip" data-tooltip="게임 SFX로 쓰기 좋은 짧은 원샷 사운드를 우선합니다.">
                  <input type="checkbox" data-search-mode="short_sfx" />
                  <span>짧은 원샷 SFX</span>
                </label>
                <label class="condition-chip" data-tooltip="파형이 분리되어 잘라 쓰기 쉬운 후보를 우선합니다.">
                  <input type="checkbox" data-search-mode="easy_cut" />
                  <span>컷오프 쉬움</span>
                </label>
                <label class="condition-chip" data-tooltip="반복 재생이나 BGM 후보로 쓸 수 있는 사운드를 우선합니다.">
                  <input type="checkbox" data-search-mode="loop_bgm" />
                  <span>루프/BGM 후보</span>
                </label>
                <label class="condition-chip" data-tooltip="CC0와 출처 표기 가능 라이선스를 우선하고 위험한 라이선스는 감점합니다.">
                  <input type="checkbox" data-search-mode="rights_safe" />
                  <span>저작권 안전 우선</span>
                </label>
                <label
                  class="condition-chip"
                  data-tooltip="검색 후 상위 후보 5개의 파형과 음량/무음 정보를 자동 분석합니다."
                >
                  <input
                    id="auto-analyze"
                    type="checkbox"
                    data-tooltip="검색 후 상위 후보 5개의 파형과 음량/무음 정보를 자동 분석합니다."
                  />
                  <span>상위 5개 자동 파형 분석</span>
                </label>
                <label
                  class="condition-chip"
                  data-tooltip="10초 이상 긴 사운드를 재생할 때 다른 사운드를 자동으로 일시정지합니다."
                >
                  <input id="solo-long-audio" type="checkbox" checked />
                  <span>10초 이상 단독 재생</span>
                </label>
              </fieldset>
            </form>
          </section>

          <section class="status-row" aria-live="polite">
            <div id="status">검색어를 입력하세요.</div>
            <div id="provider-status" class="provider-status" aria-label="API 연결 상태"></div>
            <button id="refresh-saved" type="button" data-tooltip="저장 후보와 폴더 목록을 서버에서 다시 불러옵니다.">저장 목록 새로고침</button>
          </section>
          <div id="condition-warning" class="condition-warning" aria-live="polite"></div>

          <section class="results-panel">
            <h2>검색 결과</h2>
            <div id="results" class="sound-grid"></div>
          </section>
        </div>

        <aside id="saved-panel" class="saved-panel" aria-label="저장한 후보">
          <button
            id="saved-panel-toggle"
            class="saved-panel-toggle"
            type="button"
            aria-controls="saved-panel-body"
            aria-expanded="true"
            aria-label="저장 후보 패널 접기"
            title="저장 후보 패널 접기"
            data-tooltip="저장 후보 패널을 접거나 펼쳐 검색 영역의 폭을 조정합니다."
          >
            <span aria-hidden="true">›</span>
          </button>
          <div class="saved-panel-rail" aria-hidden="true">
            <span>저장</span>
            <strong id="saved-panel-count">0</strong>
          </div>
          <div id="saved-panel-body" class="saved-panel-body">
            <h2>저장한 후보</h2>
            <div class="folder-create">
              <input id="new-folder-name" type="text" placeholder="새 폴더명" data-tooltip="새 저장 폴더 이름을 입력합니다." />
              <button id="create-folder" type="button" data-tooltip="입력한 이름으로 저장 후보 폴더를 만듭니다.">폴더 생성</button>
            </div>
            <div class="saved-controls">
              <input id="saved-filter" type="search" placeholder="저장 후보 필터" data-tooltip="저장한 후보를 제목, 메모, 폴더명으로 좁혀 봅니다." />
              <select id="saved-sort" aria-label="저장 후보 정렬" data-tooltip="저장 후보 목록의 정렬 기준을 바꿉니다.">
                <option value="recent">최근 저장순</option>
                <option value="fit">적합도 높은 순</option>
                <option value="score">점수 높은 순</option>
                <option value="duration_asc">짧은 순</option>
                <option value="duration_desc">긴 순</option>
              </select>
              <label data-tooltip="저장 후보 중 CC0 라이선스만 표시합니다.">
                <input id="saved-cc0" type="checkbox" />
                <span>CC0만</span>
              </label>
              <label data-tooltip="좋음 평가가 남아 있는 저장 후보만 표시합니다.">
                <input id="saved-good" type="checkbox" />
                <span>좋음 평가만</span>
              </label>
            </div>
            <div id="saved" class="saved-list"></div>
          </div>
        </aside>
      </section>
    </main>

    <template id="sound-card-template">
      <article class="sound-card">
        <div class="card-head">
          <div>
            <span class="source-badge"></span>
            <h3></h3>
            <p class="meta"></p>
          </div>
          <div class="score-stack">
            <strong class="score" aria-label="점수" data-tooltip="검색어, 길이, 라이선스, 분석값 등을 반영한 후보 점수입니다."></strong>
            <button
              class="save-icon"
              type="button"
              data-action="save"
              aria-pressed="false"
              aria-label="저장"
              data-tooltip="후보를 저장하거나 저장 해제합니다. 폴더가 있으면 저장 위치를 선택합니다."
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 3.75A2.25 2.25 0 0 1 8.25 1.5h7.5A2.25 2.25 0 0 1 18 3.75v18l-6-3.25-6 3.25v-18Z"></path>
              </svg>
              <span>저장</span>
            </button>
          </div>
        </div>
        <div class="loud-warning" hidden>청취 주의: 음량이 큼</div>
        <div class="analysis-state" hidden>분석됨</div>
        <div class="waveform-panel" hidden>
          <canvas class="waveform-canvas" width="640" height="96"></canvas>
          <div class="analysis-metrics"></div>
        </div>
        <audio controls preload="none"></audio>
        <div class="fit-badges"></div>
        <div class="tags"></div>

        <div class="feedback-actions" aria-label="사용자 평가">
          <div class="feedback-group feedback-primary" aria-label="전체 평가">
            <button
              type="button"
              data-feedback="good"
              data-feedback-group="preference"
              aria-pressed="false"
              data-tooltip="좋은 후보로 평가합니다. 이후 비슷한 후보 판단에 참고됩니다."
            >좋음</button>
            <button
              type="button"
              data-feedback="bad"
              data-feedback-group="preference"
              aria-pressed="false"
              data-tooltip="별로인 후보로 평가합니다. 이유를 함께 남기면 더 유용합니다."
            >별로</button>
          </div>
          <div class="feedback-group feedback-details positive-reasons" aria-label="좋았던 점" hidden>
            <span class="feedback-title">활용성</span>
            <button type="button" data-feedback="game_like" aria-pressed="false">게임적임</button>
            <button type="button" data-feedback="asset_ready" aria-pressed="false">에셋활용 가능</button>
            <button type="button" data-feedback="easy_cut" aria-pressed="false">컷오프 쉬움</button>
            <button type="button" data-feedback="loop_good" aria-pressed="false">루프 좋음</button>
            <span class="feedback-title">음색</span>
            <button type="button" data-feedback="heavy_good" aria-pressed="false">묵직함 좋음</button>
            <button type="button" data-feedback="sharp_good" aria-pressed="false">날카로움 좋음</button>
            <button type="button" data-feedback="clean_good" aria-pressed="false">깨끗함</button>
          </div>
          <div class="feedback-group bad-reasons" aria-label="마음에 안 든 점" hidden>
            <span class="feedback-title">마음에 안 든 점</span>
            <button type="button" data-feedback="noise_bad" aria-pressed="false" data-tooltip="마음에 안 든 이유를 남겨 비슷한 후보의 점수 보정에 활용합니다.">잡음 많음</button>
            <button type="button" data-feedback="leading_silence_bad" aria-pressed="false">앞 무음 김</button>
            <button type="button" data-feedback="too_sharp" aria-pressed="false">너무 날카로움</button>
            <button type="button" data-feedback="too_loud" aria-pressed="false">너무 큼</button>
            <button type="button" data-feedback="too_long" aria-pressed="false">너무 김</button>
            <button type="button" data-feedback="low_quality" aria-pressed="false">품질 낮음</button>
            <button type="button" data-feedback="wrong_mood" aria-pressed="false">느낌 안 맞음</button>
            <button type="button" data-feedback="license_risky" aria-pressed="false">라이선스 불안</button>
          </div>
        </div>
        <div class="card-actions">
          <button type="button" data-action="download" data-tooltip="현재 앱에서 접근 가능한 미리듣기 파일을 다운로드합니다.">다운로드</button>
          <a data-action="open" target="_blank" rel="noreferrer" data-tooltip="원본 페이지에서 저작자, 라이선스, 고음질 파일 여부를 확인합니다.">원본 보기</a>
          <button type="button" data-action="details" data-tooltip="점수 근거, 전체 태그, 라이선스/출처 정보, 고급 듣기 기능을 봅니다.">상세</button>
        </div>
        <details class="card-details">
          <summary>상세 정보와 고급 청취</summary>
          <p class="license-note"></p>
          <p class="attribution-note"></p>
          <div class="score-reasons"></div>
          <div class="all-tags"></div>
          <p class="description"></p>
          <div class="analysis-actions">
            <button type="button" data-action="waveform" data-tooltip="오디오 파형과 무음/음량 분석을 표시합니다.">파형 보기</button>
            <button type="button" data-action="loop" aria-pressed="false" data-tooltip="전체 미리듣기를 반복 재생합니다.">루프 듣기</button>
            <button type="button" data-action="loop-start" data-tooltip="현재 재생 위치를 구간 반복 시작점으로 지정합니다.">A</button>
            <button type="button" data-action="loop-end" data-tooltip="현재 재생 위치를 구간 반복 끝점으로 지정합니다.">B</button>
            <button type="button" data-action="segment-loop" aria-pressed="false" data-tooltip="A/B로 지정한 구간을 반복 재생합니다.">구간 루프</button>
            <button type="button" data-action="clear-loop" data-tooltip="루프와 A/B 구간 설정을 해제합니다.">해제</button>
            <span class="loop-status">Loop: Off</span>
          </div>
        </details>
      </article>
    </template>

    <div id="help-tour-overlay" class="help-tour-overlay" hidden></div>
    <section
      id="help-tour-popover"
      class="help-tour-popover"
      role="dialog"
      aria-modal="true"
      aria-labelledby="help-tour-title"
      hidden
    >
      <span id="help-tour-step" class="help-tour-step"></span>
      <h2 id="help-tour-title"></h2>
      <p id="help-tour-description"></p>
      <div class="help-tour-actions">
        <button id="help-tour-prev" type="button">이전</button>
        <button id="help-tour-close" type="button">닫기</button>
        <button id="help-tour-next" type="button">다음</button>
      </div>
    </section>
    <div id="help-tooltip" class="help-tooltip" role="tooltip" hidden></div>

    <div id="download-choice-modal" class="modal-backdrop" hidden>
      <section
        class="download-choice-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="download-choice-title"
      >
        <h2 id="download-choice-title">Freesound 로그인이 필요합니다</h2>
        <p id="download-choice-description">
          로그인하면 원본 품질로 다운로드할 수 있습니다. 로그인하지 않으면 현재는 미리듣기용 프리뷰 파일로 다운로드됩니다.
        </p>
        <div class="download-choice-actions">
          <button id="download-choice-login" type="button">로그인하기</button>
          <button id="download-choice-preview" type="button">프리뷰 다운로드</button>
          <button id="download-choice-cancel" type="button">취소</button>
        </div>
      </section>
    </div>

    <footer class="site-footer">
      <div>
        <strong>Data sources</strong>
        <a href="https://freesound.org/" target="_blank" rel="noreferrer">Freesound</a>
        <a href="https://www.jamendo.com/" target="_blank" rel="noreferrer">Jamendo</a>
        <a href="https://openverse.org/" target="_blank" rel="noreferrer">Openverse</a>
      </div>
      <p>개별 음원의 저작자 표기와 라이선스는 각 카드의 원본 페이지를 기준으로 확인하세요.</p>
      <p>Contact: <a href="mailto:soundscrapper.contact@gmail.com">soundscrapper.contact@gmail.com</a></p>
    </footer>

    <script src="/static/app.js?v=auth-header-20260601-1" defer></script>
  </body>
</html>
